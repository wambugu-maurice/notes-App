<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Notes</title>
</head>
<body>
    <div class="mainPage">
        <div class="leftPage">

            <button id="openModal">New Note</button>
                <div id="modalOverlay" class="overlay">
                    <div class="modals">
                        <div class="contentArea">
                            <h2>Create Note</h2>
                            <input type="text" placeholder="Title" id="title">
                            <div id="notesArea"></div>
                        </div>
                        <div class="buttons">
                            <button id="closeModal" class="close">Close</button>
                            <button id="saveBtn">Save</button>
                        </div>
                    </div>
                </div>

                <button id="logoutBtn">Logout</button>
        </div>
        <div class="notesSide" >
            <div class="userName" id="msg">
                <h2 id="userProfile"></h2> 
                <input type="text" name="" id="searchBox" placeholder="search for a note">
            </div>
            <div id="notes" ></div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-analytics.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.0/firebase-firestore.js"></script>
    <script src="javascript/config.js"></script>
    <script src="/javascript/index.js"></script>
</body>
</html>
